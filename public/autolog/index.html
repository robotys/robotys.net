<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoLog | My Garage</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        /* Hide scrollbars but allow scrolling */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions for view switching */
        .view-section { display: none; transition: opacity 0.2s ease-in-out; }
        .view-section.active { display: block; }
        
        /* Mobile-friendly touch targets */
        button, a, input { touch-action: manipulation; }
        
        /* Animation for toast */
        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .animate-toast { animation: slideUp 0.3s ease-out forwards; }

        .tab-active { color: #4f46e5; border-bottom: 2px solid #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans selection:bg-indigo-100">

    <!-- App Shell -->
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative pb-24">
        
        <!-- Header -->
        <header class="bg-white border-b sticky top-0 z-30 px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="car" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-indigo-900">AutoLog</h1>
            </div>
            <div id="vehicle-count-badge" class="hidden text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded-full uppercase tracking-wider">
                <span id="v-count-num">0</span>/30 Cars
            </div>
        </header>

        <!-- Main Content Areas -->
        <main class="flex-1 p-4 overflow-x-hidden">
            
            <!-- Garage List View (Home) -->
            <section id="view-garage" class="view-section active space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-extrabold text-slate-800">My Garage</h2>
                    <button id="add-v-top" onclick="prepareNewVehicle()" class="text-indigo-600 p-2 bg-indigo-50 rounded-xl">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="garage-list" class="space-y-4">
                    <!-- List of vehicle cards -->
                </div>
            </section>

            <!-- Detailed Dashboard View (Specific Vehicle) -->
            <section id="view-dashboard" class="view-section space-y-4">
                <div id="dashboard-content">
                    <!-- Detailed vehicle stats -->
                </div>
            </section>

            <!-- Services View -->
            <section id="view-services" class="view-section space-y-4">
                <div class="flex items-center gap-4 mb-2">
                    <button onclick="showView('garage')" class="p-2 bg-slate-100 rounded-full">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    </button>
                    <h2 class="text-lg font-bold">Service Logs</h2>
                </div>
                
                <!-- History/Future Tabs -->
                <div class="flex border-b text-sm font-bold text-slate-400">
                    <button onclick="setServiceTab('past')" id="tab-past" class="flex-1 py-3 tab-active">History</button>
                    <button onclick="setServiceTab('future')" id="tab-future" class="flex-1 py-3">Upcoming</button>
                </div>

                <div class="flex justify-end pt-2">
                    <button onclick="prepareAddService()" class="text-indigo-600 text-xs font-bold flex items-center gap-1 bg-indigo-50 px-3 py-1.5 rounded-lg">
                        <i data-lucide="plus" class="w-3 h-3"></i> Add Entry
                    </button>
                </div>

                <div id="service-list" class="space-y-3">
                    <!-- List of service entries -->
                </div>
            </section>

            <!-- Setup/Edit Vehicle View -->
            <section id="view-setup" class="view-section space-y-6">
                <div class="flex items-center gap-4">
                    <button onclick="showView('garage')" class="p-2 bg-slate-100 rounded-full">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="setup-title" class="text-xl font-bold">Setup Vehicle</h2>
                </div>
                <form id="vehicle-form" class="space-y-4">
                    <input type="hidden" id="edit-vehicle-id">
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Vehicle Nickname</label>
                            <input type="text" id="v-name" required maxlength="20" placeholder="e.g. Blue SUV" class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">License Plate</label>
                            <input type="text" id="v-plate" required placeholder="ABC-1234" class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Current Mileage</label>
                                <input type="number" id="v-mileage" required min="0" class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Next Service Milestone</label>
                                <input type="number" id="v-next" required min="0" class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                    </div>
                    <div class="pt-4 space-y-3">
                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform">Save Vehicle</button>
                        <button type="button" id="delete-vehicle-btn" class="hidden w-full bg-red-50 text-red-600 py-3 rounded-xl font-medium active:bg-red-100 transition-colors">Delete Vehicle</button>
                    </div>
                </form>
            </section>

            <!-- Add/Edit Service View -->
            <section id="view-add-service" class="view-section space-y-6">
                <div class="flex items-center gap-4">
                    <button onclick="showView('services')" class="p-2 bg-slate-100 rounded-full">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="service-form-title" class="text-xl font-bold">Service Record</h2>
                </div>
                <form id="service-form" class="space-y-4">
                    <input type="hidden" id="edit-service-index">
                    <input type="hidden" id="edit-service-type"> <!-- 'past' or 'future' -->
                    
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                        <div class="flex bg-slate-100 p-1 rounded-xl mb-2">
                            <button type="button" onclick="toggleFormType('past')" id="form-type-past" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white shadow-sm text-indigo-600">Completed</button>
                            <button type="button" onclick="toggleFormType('future')" id="form-type-future" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-500">Planned</button>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1" id="label-date">Date Done</label>
                                <input type="date" id="s-date" required class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Mileage (km)</label>
                                <input type="number" id="s-mileage" required class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                        <div id="cost-input-container">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total Cost ($)</label>
                            <input type="number" step="0.01" id="s-cost" class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Service Task</label>
                            <textarea id="s-items" required rows="2" placeholder="Oil change, Filter..." class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                        </div>
                        
                        <!-- Notification Toggle -->
                        <div id="notification-toggle-container" class="hidden border-t pt-4 flex items-center justify-between">
                            <div>
                                <p class="text-sm font-bold text-slate-700">Get Notified</p>
                                <p class="text-[10px] text-slate-400">1 week and 1 day before</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="s-notify" class="sr-only peer">
                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Notes</label>
                            <input type="text" id="s-notes" class="w-full p-3 bg-slate-50 border-0 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div class="pt-4">
                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-transform">Save Record</button>
                    </div>
                </form>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t px-6 py-4 flex justify-around items-center max-w-md mx-auto z-40">
            <button onclick="showView('garage')" id="nav-garage" class="nav-btn flex flex-col items-center gap-1 text-indigo-600">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Garage</span>
            </button>
            <button onclick="prepareNewVehicle()" id="nav-add" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="plus-circle" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Add</span>
            </button>
            <button onclick="showActiveVehicleSettings()" id="nav-setup" class="nav-btn flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-wider">Settings</span>
            </button>
        </nav>

        <!-- Toast Notifications -->
        <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-xs space-y-2 pointer-events-none px-4 z-50"></div>
    </div>

    <!-- Quick Mileage Modal -->
    <div id="mileage-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl translate-y-full transition-transform duration-300" id="mileage-modal-box">
            <h3 class="text-xl font-bold mb-1">Update Odometer</h3>
            <p class="text-xs text-slate-500 mb-6">Last recorded: <span id="current-odo-val">0</span> km</p>
            <input type="number" id="quick-odo-input" class="w-full p-5 bg-slate-100 border-2 border-slate-200 rounded-2xl text-3xl font-mono text-center mb-6 outline-none focus:border-indigo-500" placeholder="00000">
            <div class="flex gap-3">
                <button onclick="closeMileageModal()" class="flex-1 py-4 text-slate-600 font-medium bg-slate-50 rounded-xl">Cancel</button>
                <button onclick="saveQuickMileage()" class="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-bold">Update</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * AUTO LOG - CORE APP LOGIC
         */

        let currentVehicleId = null;
        let vehicles = [];
        let activeServiceTab = 'past'; // 'past' or 'future'
        let activeFormType = 'past';
        const MAX_VEHICLES = 30;
        const DUE_THRESHOLD = 500;

        function refreshIcons() { lucide.createIcons(); }

        // --- Storage Logic ---

        function loadAllData() {
            const stored = localStorage.getItem('vehicle_tracker_ids');
            const ids = stored ? JSON.parse(stored) : [];
            vehicles = ids.map(id => {
                const data = JSON.parse(localStorage.getItem(`vehicle_${id}`));
                // Ensure futureServices array exists for legacy data
                if (!data.futureServices) data.futureServices = [];
                return data;
            });
            
            const lastId = localStorage.getItem('last_active_vehicle');
            if (lastId && vehicles.some(v => v.id === lastId)) {
                currentVehicleId = lastId;
            }
            checkNotifications();
        }

        function saveData() {
            const ids = vehicles.map(v => v.id);
            localStorage.setItem('vehicle_tracker_ids', JSON.stringify(ids));
            vehicles.forEach(v => {
                localStorage.setItem(`vehicle_${v.id}`, JSON.stringify(v));
            });
            if (currentVehicleId) {
                localStorage.setItem('last_active_vehicle', currentVehicleId);
            }
        }

        function getCurrentVehicle() {
            return vehicles.find(v => v.id === currentVehicleId);
        }

        // --- Notifications ---

        function checkNotifications() {
            if (!("Notification" in window)) return;
            if (Notification.permission === "default") {
                // Request happens on first interaction or setup
            }

            const now = new Date();
            now.setHours(0,0,0,0);
            
            vehicles.forEach(v => {
                v.futureServices.forEach(s => {
                    if (!s.notify) return;
                    
                    const sDate = new Date(s.date);
                    sDate.setHours(0,0,0,0);
                    const diffDays = Math.ceil((sDate - now) / (1000 * 60 * 60 * 24));
                    
                    if (diffDays === 7 || diffDays === 1) {
                        const msg = diffDays === 7 ? "Service due in 1 week" : "Service due tomorrow";
                        const notificationId = `notify_${v.id}_${s.date}_${diffDays}`;
                        
                        // Prevent duplicate notifications in same session
                        if (!sessionStorage.getItem(notificationId)) {
                            new Notification(`AutoLog: ${v.name}`, {
                                body: `${msg}: ${s.items}`,
                                icon: 'https://cdn-icons-png.flaticon.com/512/741/741407.png'
                            });
                            sessionStorage.setItem(notificationId, 'true');
                        }
                    }
                });
            });
        }

        // --- Navigation ---

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            // Toggle nav highlights
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-indigo-600');
                btn.classList.add('text-slate-400');
            });
            
            const activeNavId = (viewId === 'garage') ? 'nav-garage' : 
                                (viewId === 'setup' && !currentVehicleId) ? 'nav-add' :
                                (viewId === 'setup' && currentVehicleId) ? 'nav-setup' : 'nav-garage';
                                
            const activeNav = document.getElementById(activeNavId);
            if (activeNav) {
                activeNav.classList.add('text-indigo-600');
                activeNav.classList.remove('text-slate-400');
            }

            // Render logic
            if (viewId === 'garage') renderGarage();
            if (viewId === 'dashboard') renderDashboard();
            if (viewId === 'services') renderServiceList();
            
            window.scrollTo(0, 0);
        }

        // --- Rendering Logic ---

        function renderGarage() {
            const container = document.getElementById('garage-list');
            document.getElementById('v-count-num').innerText = vehicles.length;
            document.getElementById('vehicle-count-badge').classList.toggle('hidden', vehicles.length === 0);

            if (vehicles.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-100 rounded-3xl p-10 text-center space-y-4 shadow-sm">
                        <div class="w-16 h-16 bg-indigo-50 rounded-2xl mx-auto flex items-center justify-center text-indigo-600">
                            <i data-lucide="car" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-bold">Garage is Empty</h3>
                        <p class="text-slate-500 text-sm">Track mileage and schedule maintenance for your cars.</p>
                        <button onclick="prepareNewVehicle()" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold w-full shadow-lg shadow-indigo-100 active:scale-95 transition-transform">Add Your Vehicle</button>
                    </div>
                `;
            } else {
                container.innerHTML = vehicles.map(v => {
                    const remaining = v.nextServiceMileage - v.currentMileage;
                    let statusColor = 'bg-emerald-500';
                    if (remaining <= 0) statusColor = 'bg-rose-500';
                    else if (remaining < DUE_THRESHOLD) statusColor = 'bg-amber-500';

                    return `
                        <div onclick="selectVehicle('${v.id}')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 active:scale-[0.98] transition-all">
                            <div class="w-12 h-12 ${statusColor} text-white rounded-2xl flex items-center justify-center shrink-0 shadow-sm">
                                <i data-lucide="car" class="w-6 h-6"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-slate-800 truncate">${v.name}</h3>
                                    <span class="text-[10px] font-mono bg-slate-100 px-2 py-0.5 rounded text-slate-500 uppercase">${v.plate}</span>
                                </div>
                                <p class="text-xs text-slate-400 mt-0.5">${Number(v.currentMileage).toLocaleString()} km recorded</p>
                            </div>
                            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                        </div>
                    `;
                }).join('');
            }
            refreshIcons();
        }

        function renderDashboard() {
            const v = getCurrentVehicle();
            if (!v) { showView('garage'); return; }

            const container = document.getElementById('dashboard-content');
            const remaining = v.nextServiceMileage - v.currentMileage;
            let status = { text: 'Healthy', color: 'bg-emerald-100 text-emerald-700', icon: 'check-circle' };
            
            if (remaining <= 0) {
                status = { text: 'Overdue', color: 'bg-rose-100 text-rose-700', icon: 'alert-triangle' };
            } else if (remaining < DUE_THRESHOLD) {
                status = { text: 'Due Soon', color: 'bg-amber-100 text-amber-700', icon: 'clock' };
            }

            const lastService = v.services.length > 0 ? v.services[0] : null;
            
            // Find next upcoming service
            const nowStr = new Date().toISOString().split('T')[0];
            const nextPlanned = v.futureServices
                .filter(s => s.date >= nowStr)
                .sort((a,b) => new Date(a.date) - new Date(b.date))[0];

            container.innerHTML = `
                <div class="flex items-center gap-3 mb-4">
                    <button onclick="showView('garage')" class="p-2 bg-white border border-slate-100 rounded-xl text-slate-400">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">${v.name}</h2>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">${v.plate}</p>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="inline-flex items-center gap-1.5 ${status.color} px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide">
                            <i data-lucide="${status.icon}" class="w-3.5 h-3.5"></i>
                            ${status.text}
                        </span>
                        <button onclick="openEditVehicle()" class="text-slate-400 p-1">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 rounded-2xl p-4 relative">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Odometer</p>
                            <p class="text-2xl font-black">${Number(v.currentMileage).toLocaleString()} <span class="text-xs font-medium text-slate-400">km</span></p>
                            <button onclick="openMileageModal()" class="absolute top-2 right-2 p-1.5 bg-white shadow-sm border rounded-lg text-indigo-600 active:scale-90 transition-transform">
                                <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        <div class="bg-slate-50 rounded-2xl p-4">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Until Next</p>
                            <p class="text-2xl font-black ${remaining < 0 ? 'text-rose-600' : ''}">${Number(Math.abs(remaining)).toLocaleString()} <span class="text-xs font-medium text-slate-400">km</span></p>
                        </div>
                    </div>

                    <div class="bg-indigo-600 rounded-2xl p-5 text-white flex justify-between items-center shadow-lg shadow-indigo-100">
                        <div>
                            <p class="text-[10px] font-bold opacity-70 uppercase tracking-wider">Service Milestone</p>
                            <p class="text-xl font-bold">${Number(v.nextServiceMileage).toLocaleString()} km</p>
                        </div>
                        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                             <i data-lucide="wrench" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

                <!-- Planned Next Section -->
                ${nextPlanned ? `
                <div class="bg-amber-50 border border-amber-100 rounded-3xl p-5 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-amber-900 flex items-center gap-2">
                            <i data-lucide="calendar" class="w-4 h-4"></i> Upcoming Service
                        </h3>
                        <span class="text-[10px] font-bold bg-amber-200 text-amber-800 px-2 py-0.5 rounded-full uppercase">Planned</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-xs text-amber-700 mb-1">${formatDate(nextPlanned.date)}</p>
                            <p class="font-bold text-slate-800">${nextPlanned.items}</p>
                        </div>
                        <button onclick="setServiceTab('future'); showView('services');" class="text-xs font-bold text-amber-700 underline underline-offset-4">Manage</button>
                    </div>
                </div>
                ` : ''}

                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-slate-800">Latest Record</h3>
                        <button onclick="setServiceTab('past'); showView('services');" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg">View History</button>
                    </div>
                    ${lastService ? `
                        <div class="flex justify-between items-center border-l-4 border-indigo-500 pl-4 py-1">
                            <div>
                                <p class="text-xs text-slate-500">${formatDate(lastService.date)}</p>
                                <p class="font-bold text-slate-800 line-clamp-1">${lastService.items}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-slate-900">$${Number(lastService.cost).toFixed(0)}</p>
                            </div>
                        </div>
                    ` : `
                        <div class="text-center py-4">
                            <p class="text-slate-400 text-sm mb-3">No history recorded.</p>
                            <button onclick="prepareAddService()" class="text-xs font-bold text-indigo-600 border border-indigo-100 px-4 py-2 rounded-xl">Add First Entry</button>
                        </div>
                    `}
                </div>
            `;
            refreshIcons();
        }

        function renderServiceList() {
            const v = getCurrentVehicle();
            const container = document.getElementById('service-list');
            
            // Tab Toggle
            document.getElementById('tab-past').className = `flex-1 py-3 ${activeServiceTab === 'past' ? 'tab-active' : ''}`;
            document.getElementById('tab-future').className = `flex-1 py-3 ${activeServiceTab === 'future' ? 'tab-active' : ''}`;

            const listData = activeServiceTab === 'past' ? v.services : v.futureServices;

            if (!v || listData.length === 0) {
                container.innerHTML = `<div class="py-20 text-center"><p class="text-slate-400">No records found.</p></div>`;
                return;
            }

            container.innerHTML = listData.map((s, idx) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 flex gap-4 relative active:bg-slate-50 transition-colors">
                    <div class="w-12 h-12 ${activeServiceTab === 'future' ? 'bg-amber-50 text-amber-600' : 'bg-slate-50 text-slate-400'} rounded-xl flex items-center justify-center shrink-0">
                        <i data-lucide="${activeServiceTab === 'future' ? 'calendar-clock' : 'tool'}" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0 pr-12">
                        <div class="flex items-center gap-2 mb-0.5">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${formatDate(s.date)} • ${Number(s.mileage).toLocaleString()} KM</p>
                            ${s.notify ? '<i data-lucide="bell" class="w-3 h-3 text-indigo-500"></i>' : ''}
                        </div>
                        <h4 class="font-bold text-slate-800 truncate">${s.items}</h4>
                        <p class="text-xs text-slate-500 truncate">${s.notes || 'No notes'}</p>
                        ${activeServiceTab === 'past' ? `<p class="text-sm font-black text-indigo-600 mt-1">$${Number(s.cost).toFixed(2)}</p>` : ''}
                    </div>
                    <div class="absolute top-4 right-4 flex flex-col gap-2">
                        <button onclick="editService(${idx}, '${activeServiceTab}')" class="p-2 text-slate-300 hover:text-indigo-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteService(${idx}, '${activeServiceTab}')" class="p-2 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            refreshIcons();
        }

        // --- Interaction Handlers ---

        function setServiceTab(tab) {
            activeServiceTab = tab;
            renderServiceList();
        }

        function toggleFormType(type) {
            activeFormType = type;
            const btnPast = document.getElementById('form-type-past');
            const btnFuture = document.getElementById('form-type-future');
            const costContainer = document.getElementById('cost-input-container');
            const notifyContainer = document.getElementById('notification-toggle-container');
            const labelDate = document.getElementById('label-date');

            if (type === 'past') {
                btnPast.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white shadow-sm text-indigo-600";
                btnFuture.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-500";
                costContainer.classList.remove('hidden');
                notifyContainer.classList.add('hidden');
                labelDate.innerText = "Date Done";
            } else {
                btnPast.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-500";
                btnFuture.className = "flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white shadow-sm text-amber-600";
                costContainer.classList.add('hidden');
                notifyContainer.classList.remove('hidden');
                labelDate.innerText = "Target Date";
                
                // Request Permission
                if ("Notification" in window && Notification.permission === "default") {
                    Notification.requestPermission();
                }
            }
        }

        function selectVehicle(id) {
            currentVehicleId = id;
            saveData();
            showView('dashboard');
        }

        function prepareNewVehicle() {
            if (vehicles.length >= MAX_VEHICLES) {
                showToast("Limit reached: 30 vehicles maximum", "error");
                return;
            }
            document.getElementById('setup-title').innerText = "Add Vehicle";
            document.getElementById('vehicle-form').reset();
            document.getElementById('edit-vehicle-id').value = "";
            document.getElementById('delete-vehicle-btn').classList.add('hidden');
            showView('setup');
        }

        function openEditVehicle() {
            const v = getCurrentVehicle();
            if (!v) return;
            document.getElementById('setup-title').innerText = "Edit Vehicle";
            document.getElementById('edit-vehicle-id').value = v.id;
            document.getElementById('v-name').value = v.name;
            document.getElementById('v-plate').value = v.plate;
            document.getElementById('v-mileage').value = v.currentMileage;
            document.getElementById('v-next').value = v.nextServiceMileage;
            document.getElementById('delete-vehicle-btn').classList.remove('hidden');
            showView('setup');
        }

        function showActiveVehicleSettings() {
            if (currentVehicleId) openEditVehicle();
            else prepareNewVehicle();
        }

        function openMileageModal() {
            const v = getCurrentVehicle();
            document.getElementById('current-odo-val').innerText = Number(v.currentMileage).toLocaleString();
            document.getElementById('quick-odo-input').value = v.currentMileage;
            document.getElementById('mileage-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('mileage-modal-box').classList.remove('translate-y-full'), 50);
        }

        function closeMileageModal() {
            document.getElementById('mileage-modal-box').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('mileage-modal').classList.add('hidden'), 300);
        }

        function saveQuickMileage() {
            const v = getCurrentVehicle();
            const val = parseInt(document.getElementById('quick-odo-input').value);
            if (val >= v.currentMileage) {
                v.currentMileage = val;
                saveData();
                closeMileageModal();
                showView('dashboard');
                showToast("Mileage updated!");
            } else {
                showToast("Odometer cannot go backwards", "error");
            }
        }

        function prepareAddService() {
            document.getElementById('service-form-title').innerText = "New Record";
            document.getElementById('service-form').reset();
            document.getElementById('edit-service-index').value = "";
            document.getElementById('edit-service-type').value = "";
            toggleFormType('past');
            showView('add-service');
        }

        function editService(index, type) {
            const v = getCurrentVehicle();
            const s = type === 'past' ? v.services[index] : v.futureServices[index];
            
            document.getElementById('service-form-title').innerText = "Edit Entry";
            document.getElementById('edit-service-index').value = index;
            document.getElementById('edit-service-type').value = type;
            
            toggleFormType(type);
            
            document.getElementById('s-date').value = s.date;
            document.getElementById('s-mileage').value = s.mileage;
            document.getElementById('s-cost').value = s.cost || "";
            document.getElementById('s-items').value = s.items;
            document.getElementById('s-notes').value = s.notes;
            document.getElementById('s-notify').checked = s.notify || false;
            
            showView('add-service');
        }

        function deleteService(index, type) {
            if (confirm("Delete this record permanently?")) {
                const v = getCurrentVehicle();
                if (type === 'past') v.services.splice(index, 1);
                else v.futureServices.splice(index, 1);
                saveData();
                renderServiceList();
                showToast("Record removed");
            }
        }

        function showToast(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl shadow-xl border text-sm font-bold flex items-center gap-2 animate-toast bg-white ${type === 'error' ? 'text-red-600 border-red-100' : 'text-indigo-600 border-indigo-100'}`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => {
                toast.classList.add('opacity-0', 'transition-opacity', 'duration-500');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        // --- Event Listeners ---

        document.getElementById('vehicle-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-vehicle-id').value || 'v_' + Date.now();
            const name = document.getElementById('v-name').value;
            const plate = document.getElementById('v-plate').value;
            const currentMileage = parseInt(document.getElementById('v-mileage').value);
            const nextServiceMileage = parseInt(document.getElementById('v-next').value);

            const existingIdx = vehicles.findIndex(v => v.id === id);
            if (existingIdx > -1) {
                vehicles[existingIdx] = { ...vehicles[existingIdx], name, plate, currentMileage, nextServiceMileage };
            } else {
                vehicles.push({ id, name, plate, currentMileage, nextServiceMileage, services: [], futureServices: [] });
                currentVehicleId = id;
            }

            saveData();
            showToast("Vehicle saved");
            showView('garage');
        });

        document.getElementById('delete-vehicle-btn').addEventListener('click', () => {
            if (confirm("Delete this vehicle and all its history?")) {
                const id = document.getElementById('edit-vehicle-id').value;
                vehicles = vehicles.filter(v => v.id !== id);
                localStorage.removeItem(`vehicle_${id}`);
                if (currentVehicleId === id) currentVehicleId = null;
                saveData();
                showView('garage');
            }
        });

        document.getElementById('service-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const v = getCurrentVehicle();
            const index = document.getElementById('edit-service-index').value;
            const originalType = document.getElementById('edit-service-type').value;
            
            const service = {
                date: document.getElementById('s-date').value,
                mileage: parseInt(document.getElementById('s-mileage').value),
                cost: parseFloat(document.getElementById('s-cost').value || 0),
                items: document.getElementById('s-items').value,
                notes: document.getElementById('s-notes').value,
                notify: document.getElementById('s-notify').checked
            };

            // Remove from original list if editing and switching type
            if (index !== "" && originalType !== activeFormType) {
                if (originalType === 'past') v.services.splice(index, 1);
                else v.futureServices.splice(index, 1);
            }

            if (activeFormType === 'past') {
                if (index !== "" && originalType === 'past') v.services[index] = service;
                else v.services.unshift(service);
                
                // Auto update mileage if service mileage is higher
                if (service.mileage > v.currentMileage) v.currentMileage = service.mileage;
                v.services.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else {
                if (index !== "" && originalType === 'future') v.futureServices[index] = service;
                else v.futureServices.unshift(service);
                v.futureServices.sort((a, b) => new Date(a.date) - new Date(b.date));
            }

            saveData();
            document.getElementById('service-form').reset();
            showToast("Entry saved");
            activeServiceTab = activeFormType;
            showView('services');
        });

        window.addEventListener('load', () => {
            loadAllData();
            showView('garage');
        });
    </script>
</body>
</html>
